name: Extractor de EPG Personalizado

on:
  workflow_dispatch: # Activa el botón manual en GitHub para correrlo cuando quieras
  schedule:
    - cron: '0 5 */3 * *' # Se ejecuta automáticamente a las 05:00 UTC cada 3 días

jobs:
  build-epg:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga los archivos de tu repositorio (el custom.channels.xml)
      - name: Descargar repositorio propio
        uses: actions/checkout@v3

      # 2. Clona el motor oficial de iptv-org/epg de forma ultra rápida
      - name: Clonar motor de iptv-org
        run: git clone --depth 1 -b master https://github.com/iptv-org/epg.git iptv_engine

      # 3. Instala Node.js v20 en el servidor de GitHub para evitar el error de 'File'
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 4. Instala las dependencias necesarias dentro de la carpeta del motor
      - name: Instalar dependencias del motor
        run: |
          cd iptv_engine
          npm install

      # 5. Mueve tu lista personalizada dentro de la carpeta del motor para que la procese
      - name: Preparar canales personalizados
        run: cp custom.channels.xml iptv_engine/custom.channels.xml

      # 6. Lanza el comando maestro usando tu lista unificada y forzando a 5 días
      - name: Ejecutar raspado de canales
        run: |
          cd iptv_engine
          npm run grab -- --channels=custom.channels.xml --output=../guia_laboratorio.xml --days=5

      # 🔥 7. NUEVO: Corregir caracteres especiales y ampersands rotos en el XML generado
      - name: Sanear y corregir guia_laboratorio.xml
        run: |
          python3 -c "
          import re
          try:
              with open('guia_laboratorio.xml', 'r', encoding='utf-8') as f:
                  contenido = f.read()
              
              # Reemplaza los '&' sueltos por '&amp;' (solo si no están ya codificados)
              contenido_corregido = re.sub(r'&(?![a-zA-Z0-9#]+;)', '&amp;', contenido)
              
              with open('guia_laboratorio.xml', 'w', encoding='utf-8') as f:
                  f.write(contenido_corregido)
              print('🎉 XML saneado con éxito. Ampersands corregidos.')
          except Exception as e:
              print(f'⚠️ No se pudo limpiar el archivo: {e}')
          "

      # 8. Sube el archivo final ya limpio y corregido a tu repositorio
      - name: Guardar archivo final en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add guia_laboratorio.xml
          git commit -m "Guía de 5 días actualizada y saneada automáticamente por el robot" || exit 0
          git push
